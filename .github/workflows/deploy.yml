name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: 'pages'
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Node
        uses: actions/checkout@v4

      - name: Set up Node Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile 3D Portfolio Production Dist
        run: npm run build

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Build Target Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy Compiled Site Directly to Pages Live Terminal
        id: deployment
        uses: actions/deploy-pages@v4
